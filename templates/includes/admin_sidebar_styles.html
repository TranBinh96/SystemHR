<style>
    /* Sidebar collapsed styles */
    #sidebar.collapsed #sidebarContent {
        width: 5rem !important;
    }
    
    #sidebar.collapsed nav a {
        justify-content: center !important;
        gap: 0 !important;
        position: relative;
    }
    
    #sidebar.collapsed nav a .material-symbols-outlined {
        margin: 0 !important;
    }
    
    #sidebar.collapsed nav a .menu-text {
        display: none !important;
    }
    
    #sidebar.collapsed .section-title {
        display: none !important;
    }
    
    #sidebar.collapsed #appTitle {
        display: none !important;
    }
    

    /* Tooltip styles - only show when sidebar is collapsed */
    #sidebar.collapsed nav a[data-tooltip]::after {
        content: attr(data-tooltip);
        position: absolute;
        left: 100%;
        top: 50%;
        transform: translateY(-50%);
        margin-left: 0.5rem;
        padding: 0.5rem 0.75rem;
        background-color: #1f2937;
        color: white;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 1000;
    }
    
    #sidebar.collapsed nav a[data-tooltip]:hover::after,
    #sidebar.collapsed nav a[data-tooltip]:focus::after {
        opacity: 1;
    }

    /* Small gray/white scrollbars for ALL pages */
    *::-webkit-scrollbar {
        width: 6px;
        height: 6px;
    }

    *::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.5);
        border-radius: 3px;
    }

    *::-webkit-scrollbar-thumb {
        background: #9CA3AF;
        border-radius: 3px;
    }

    *::-webkit-scrollbar-thumb:hover {
        background: #6B7280;
    }

    /* Firefox */
    * {
        scrollbar-width: thin;
        scrollbar-color: #9CA3AF rgba(255, 255, 255, 0.5);
    }
