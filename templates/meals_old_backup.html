<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký suất ăn - {{ t.app_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .meal-card-selected {
            border: 3px solid #10b981 !important;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900">
    <div class="min-h-screen pb-24">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 shadow-sm">
            <div class="flex h-16 items-center justify-between px-4">
                <div class="flex items-center gap-3">
                    <a href="{{ url_for('dashboard') }}" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">
                        <span class="material-symbols-outlined">arrow_back</span>
                    </a>
                    <h1 class="text-xl font-bold text-slate-900 dark:text-slate-100">Đăng ký suất ăn</h1>
                </div>
                <select onchange="window.location.href='/set-language/' + this.value" class="px-3 py-2 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 rounded-lg text-sm font-medium">
                    <option value="vi" {% if current_lang == 'vi' %}selected{% endif %}>🇻🇳 VI</option>
                    <option value="en" {% if current_lang == 'en' %}selected{% endif %}>🇬🇧 EN</option>
                    <option value="ja" {% if current_lang == 'ja' %}selected{% endif %}>🇯🇵 JA</option>
                </select>
            </div>
        </header>

        <!-- Main Content -->
        <main class="p-4">
            <!-- Week Navigator -->
            <div class="mb-4 flex items-center justify-center bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-800 p-2 w-fit mx-auto">
                <button onclick="changeWeek(-1)" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-md">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <div class="px-4 text-sm font-bold min-w-[200px] text-center" id="weekDisplay">Tuần này</div>
                <button onclick="changeWeek(1)" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-md">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>

            <!-- Day Picker -->
            <div class="mb-6 grid grid-cols-7 gap-2">
                <!-- Will be populated by JavaScript -->
            </div>

            <!-- Selected Date Display -->
            <div class="mb-4 text-center">
                <h2 class="text-lg font-bold text-slate-900 dark:text-slate-100" id="selectedDateTitle">Chọn ngày để xem thực đơn</h2>
                <p class="text-sm text-slate-500" id="selectedDateSubtitle"></p>
            </div>

            <!-- Meals Display -->
            <div id="mealsContainer" class="space-y-4">
                <!-- Will be populated by JavaScript -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="text-center py-12">
                <span class="material-symbols-outlined text-6xl text-slate-300 mb-4">restaurant_menu</span>
                <p class="text-slate-500">Chọn một ngày để xem thực đơn</p>
            </div>
        </main>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-slate-900/95 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 shadow-2xl z-50">
        <div class="flex justify-around items-center h-20 px-4">
            <a class="flex flex-col items-center gap-1 text-slate-400" href="{{ url_for('dashboard') }}">
                <span class="material-symbols-outlined text-2xl">home</span>
                <span class="text-[10px] font-bold uppercase">Trang chủ</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-green-600" href="{{ url_for('meals') }}">
                <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">restaurant</span>
                <span class="text-[10px] font-bold uppercase">Suất ăn</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="{{ url_for('overtime') }}">
                <span class="material-symbols-outlined text-2xl">schedule</span>
                <span class="text-[10px] font-bold uppercase">Tăng ca</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="{{ url_for('profile') }}">
                <span class="material-symbols-outlined text-2xl">person</span>
                <span class="text-[10px] font-bold uppercase">Cá nhân</span>
            </a>
        </div>
    </nav>

    <script>
        let currentWeekOffset = 0;
        let selectedDate = null;
        let selectedMealId = null;

        document.addEventListener('DOMContentLoaded', function() {
            updateWeekDisplay();
            updateDayPicker();
        });

        function updateWeekDisplay() {
            const today = new Date();
            today.setDate(today.getDate() + (currentWeekOffset * 7));
            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() - today.getDay() + 1);
            
            const monthNames = ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6',
                              'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'];
            
            document.getElementById('weekDisplay').textContent = 
                `Tuần ${getWeekNumber(weekStart)}, ${monthNames[weekStart.getMonth()]} ${weekStart.getFullYear()}`;
        }

        function getWeekNumber(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
        }

        function changeWeek(offset) {
            currentWeekOffset += offset;
            updateWeekDisplay();
            updateDayPicker();
            selectedDate = null;
            document.getElementById('mealsContainer').innerHTML = '';
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('selectedDateTitle').textContent = 'Chọn ngày để xem thực đơn';
            document.getElementById('selectedDateSubtitle').textContent = '';
        }

        function updateDayPicker() {
            const today = new Date();
            today.setDate(today.getDate() + (currentWeekOffset * 7));
            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() - today.getDay() + 1);
            
            const dayNames = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
            const container = document.querySelector('.grid.grid-cols-7.gap-2');
            
            let html = '';
            for (let i = 0; i < 7; i++) {
                const day = new Date(weekStart);
                day.setDate(weekStart.getDate() + i);
                const dateStr = day.toISOString().split('T')[0];
                const dayNum = day.getDate();
                
                html += `
                    <button onclick="selectDay('${dateStr}')" 
                            id="day-${dateStr}"
                            class="day-btn flex flex-col items-center p-3 bg-white dark:bg-slate-900 rounded-xl border-2 border-slate-200 dark:border-slate-800 hover:border-green-500 transition-all">
                        <span class="text-[10px] uppercase font-bold tracking-widest text-slate-400">${dayNames[i]}</span>
                        <span class="text-xl font-black">${dayNum}</span>
                    </button>
                `;
            }
            
            container.innerHTML = html;
        }

        function selectDay(date) {
            selectedDate = date;
            
            // Update day buttons
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.classList.remove('bg-green-600', 'text-white', 'border-green-600');
                btn.classList.add('bg-white', 'dark:bg-slate-900', 'border-slate-200');
            });
            
            const selectedBtn = document.getElementById(`day-${date}`);
            if (selectedBtn) {
                selectedBtn.classList.remove('bg-white', 'dark:bg-slate-900', 'border-slate-200');
                selectedBtn.classList.add('bg-green-600', 'text-white', 'border-green-600');
            }
            
            // Update title
            const dateObj = new Date(date);
            const dayNames = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            document.getElementById('selectedDateTitle').textContent = `Thực đơn cho ${dayNames[dateObj.getDay()]}`;
            document.getElementById('selectedDateSubtitle').textContent = `${dateObj.getDate()}/${dateObj.getMonth() + 1}/${dateObj.getFullYear()}`;
            
            // Load meals
            loadMealsForDate(date);
        }

        function loadMealsForDate(date) {
            fetch(`/meals/menu/${date}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        displayMeals(data.menus, data.selected_meal_id);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showNotification('Lỗi khi tải thực đơn', 'error');
                });
        }

        function displayMeals(menus, selectedId) {
            const container = document.getElementById('mealsContainer');
            const emptyState = document.getElementById('emptyState');
            
            if (menus.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                emptyState.innerHTML = `
                    <span class="material-symbols-outlined text-6xl text-slate-300 mb-4 block">restaurant_menu</span>
                    <p class="text-slate-500">Chưa có thực đơn cho ngày này</p>
                `;
                return;
            }
            
            emptyState.style.display = 'none';
            selectedMealId = selectedId;
            
            container.innerHTML = menus.map(meal => {
                const isSelected = meal.id === selectedId;
                const typeLabel = meal.is_special ? 'Cải Thiện' : 'Bình Thường';
                const typeColor = meal.is_special ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-700';
                
                return `
                    <div onclick="selectMeal(${meal.id})" 
                         id="meal-${meal.id}"
                         class="meal-card bg-white dark:bg-slate-800 rounded-xl border-2 ${isSelected ? 'meal-card-selected border-green-500' : 'border-slate-200'} overflow-hidden cursor-pointer hover:shadow-lg transition-all">
                        ${meal.image_url ? `
                            <img src="${meal.image_url}" alt="${meal.dish_name}" class="w-full h-48 object-cover">
                        ` : `
                            <div class="w-full h-48 bg-slate-100 dark:bg-slate-700 flex items-center justify-center">
                                <span class="material-symbols-outlined text-6xl text-slate-400">restaurant</span>
                            </div>
                        `}
                        <div class="p-4">
                            <div class="flex items-start justify-between mb-2">
                                <h3 class="text-lg font-bold text-slate-900 dark:text-slate-100 flex-1">${meal.dish_name}</h3>
                                ${isSelected ? '<span class="material-symbols-outlined text-green-600" style="font-variation-settings: \'FILL\' 1">check_circle</span>' : ''}
                            </div>
                            <p class="text-sm text-slate-600 dark:text-slate-400 mb-3">${meal.description || 'Không có mô tả'}</p>
                            <span class="inline-block px-3 py-1 rounded-full text-xs font-bold ${typeColor}">${typeLabel}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function selectMeal(mealId) {
            if (!selectedDate) return;
            
            selectedMealId = mealId;
            
            // Update UI
            document.querySelectorAll('.meal-card').forEach(card => {
                card.classList.remove('meal-card-selected', 'border-green-500');
                card.classList.add('border-slate-200');
                const checkIcon = card.querySelector('.material-symbols-outlined');
                if (checkIcon && checkIcon.textContent === 'check_circle') {
                    checkIcon.remove();
                }
            });
            
            const selectedCard = document.getElementById(`meal-${mealId}`);
            if (selectedCard) {
                selectedCard.classList.add('meal-card-selected', 'border-green-500');
                selectedCard.classList.remove('border-slate-200');
                const title = selectedCard.querySelector('h3');
                if (title && !title.querySelector('.material-symbols-outlined')) {
                    title.insertAdjacentHTML('afterend', '<span class="material-symbols-outlined text-green-600 ml-2" style="font-variation-settings: \'FILL\' 1">check_circle</span>');
                }
            }
            
            // Register meal
            registerMeal(selectedDate, mealId);
        }

        function registerMeal(date, mealId) {
            fetch('/meals/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({date, meal_id: mealId})
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showNotification(data.message, 'success');
                } else {
                    showNotification(data.message || 'Có lỗi xảy ra', 'error');
                }
            })
            .catch(error => {
                showNotification('Lỗi khi đăng ký', 'error');
            });
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 z-50 p-4 rounded-lg shadow-lg ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white max-w-sm animate-slide-in`;
            notification.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined">${type === 'success' ? 'check_circle' : 'error'}</span>
                    <span>${message}</span>
                </div>
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(100%)';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
    </script>

    <style>
        @keyframes slide-in {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .animate-slide-in {
            animation: slide-in 0.3s ease-out;
            transition: all 0.3s ease-out;
        }
    </style>
</body>
</html>
