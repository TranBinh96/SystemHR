<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <h1 class="text-2xl mb-4">Test Tabs</h1>
    
    <div class="mb-4">
        <button onclick="switchTab('tab1')" id="btn-tab1" class="px-4 py-2 bg-blue-500 text-white">Tab 1</button>
        <button onclick="switchTab('tab2')" id="btn-tab2" class="px-4 py-2 bg-gray-300">Tab 2</button>
    </div>
    
    <div id="content-tab1" class="tab-content border p-4">
        <h2 class="text-xl">Tab 1 Content</h2>
        <p>This is tab 1</p>
    </div>
    
    <div id="content-tab2" class="tab-content border p-4 hidden">
        <h2 class="text-xl">Tab 2 Content</h2>
        <p>This is tab 2</p>
    </div>
    
    <script>
        function switchTab(tabName) {
            console.log('Switching to:', tabName);
            
            // Hide all
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.add('hidden');
                console.log('Hiding:', el.id);
            });
            
            // Show selected
            const selected = document.getElementById('content-' + tabName);
            selected.classList.remove('hidden');
            console.log('Showing:', selected.id);
        }
        
        console.log('Script loaded!');
    </script>
</body>
</html>
